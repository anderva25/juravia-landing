<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Persona revisando y redactando alegaciones con un documento en pantalla">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b2f6f"/>
      <stop offset="0.55" stop-color="#0a1433"/>
      <stop offset="1" stop-color="#080b18"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="35%" r="70%">
      <stop offset="0" stop-color="#2f7cf7" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2f7cf7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gold" cx="30%" cy="20%" r="70%">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur12" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111a32"/>
      <stop offset="1" stop-color="#0b1024"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#e9eef9" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="370" cy="250" r="240" fill="url(#glow)" filter="url(#blur12)"/>
  <circle cx="900" cy="210" r="260" fill="url(#gold)" filter="url(#blur12)"/>
  <g opacity="0.15">
    <path d="M90 640 C 260 560, 380 690, 520 620 S 820 580, 1020 640" fill="none" stroke="#ffffff" stroke-width="2"/>
    <path d="M120 690 C 310 610, 430 730, 560 670 S 860 620, 1080 690" fill="none" stroke="#ffffff" stroke-width="2"/>
  </g>

  <!-- desk -->
  <g filter="url(#shadow)">
    <rect x="120" y="520" width="960" height="170" rx="26" fill="#0a1024" opacity="0.65"/>
    <rect x="120" y="520" width="960" height="170" rx="26" fill="#0f1736" opacity="0.30"/>
  </g>

  <!-- laptop -->
  <g filter="url(#shadow)">
    <rect x="260" y="250" width="520" height="330" rx="26" fill="#0b1020" stroke="#2b355a" stroke-opacity="0.65"/>
    <rect x="285" y="280" width="470" height="250" rx="16" fill="url(#screen)"/>
    <rect x="240" y="575" width="560" height="40" rx="18" fill="#0a0f22" stroke="#2b355a" stroke-opacity="0.55"/>
  </g>

  <!-- UI on screen -->
  <g>
    <rect x="305" y="300" width="180" height="28" rx="10" fill="#101c3f" stroke="#2f7cf7" stroke-opacity="0.35"/>
    <circle cx="322" cy="314" r="6" fill="#d4af37"/>
    <rect x="495" y="300" width="240" height="28" rx="10" fill="#101c3f" stroke="#ffffff" stroke-opacity="0.10"/>

    <!-- checklist -->
    <g fill="#cfe0ff" opacity="0.92">
      <rect x="305" y="345" width="430" height="12" rx="6" opacity="0.45"/>
      <rect x="305" y="372" width="360" height="12" rx="6" opacity="0.35"/>
      <rect x="305" y="399" width="410" height="12" rx="6" opacity="0.35"/>
    </g>
    <g>
      <circle cx="322" cy="351" r="9" fill="#24c172" opacity="0.95"/>
      <path d="M318 351l3 3 6-8" fill="none" stroke="#06210f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="322" cy="378" r="9" fill="#24c172" opacity="0.95"/>
      <path d="M318 378l3 3 6-8" fill="none" stroke="#06210f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="322" cy="405" r="9" fill="#f0b429" opacity="0.95"/>
      <path d="M322 400v7" stroke="#402200" stroke-width="2" stroke-linecap="round"/>
      <circle cx="322" cy="414" r="1.6" fill="#402200"/>
    </g>

    <!-- watermark -->
    <g transform="translate(280 285) rotate(-18 260 150)" opacity="0.18">
      <text x="80" y="160" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="84" font-weight="800" fill="#ffffff">PREVIEW</text>
    </g>
  </g>

  <!-- paper on desk -->
  <g filter="url(#shadow)">
    <path d="M770 300 h250 a22 22 0 0 1 22 22 v320 a22 22 0 0 1-22 22 h-250 a22 22 0 0 1-22-22 v-320 a22 22 0 0 1 22-22z" fill="url(#paper)"/>
    <rect x="770" y="300" width="250" height="52" rx="18" fill="#0b2f6f" opacity="0.10"/>
    <g fill="#1b2743" opacity="0.55">
      <rect x="800" y="375" width="190" height="12" rx="6"/>
      <rect x="800" y="405" width="160" height="10" rx="5" opacity="0.75"/>
      <rect x="800" y="434" width="200" height="10" rx="5" opacity="0.65"/>
      <rect x="800" y="463" width="178" height="10" rx="5" opacity="0.65"/>
      <rect x="800" y="492" width="200" height="10" rx="5" opacity="0.55"/>
      <rect x="800" y="521" width="150" height="10" rx="5" opacity="0.55"/>
      <rect x="800" y="550" width="190" height="10" rx="5" opacity="0.45"/>
    </g>
    <g transform="translate(770 300)" opacity="0.14">
      <text x="36" y="300" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="44" font-weight="800" fill="#0b2f6f">JURAVIA</text>
    </g>
  </g>

  <!-- person -->
  <g filter="url(#shadow)">
    <!-- torso -->
    <path d="M156 530c36-62 104-100 176-92 52 6 96 38 126 82 18 27 30 62 34 98H120c6-37 16-67 36-88z" fill="#1a2a4f" opacity="0.96"/>
    <!-- head -->
    <circle cx="280" cy="402" r="54" fill="#f2c7a8"/>
    <!-- hair -->
    <path d="M232 403c-2-36 20-70 52-78 36-10 72 10 88 44 6 14 8 30 6 46-18-20-44-34-76-34-28 0-52 8-70 22z" fill="#2b1d16" opacity="0.95"/>
    <!-- arm -->
    <path d="M360 520c44-24 86-34 124-32 30 2 52 12 64 26l-20 28c-20-14-40-20-62-20-30 0-64 10-102 30z" fill="#f2c7a8"/>
    <path d="M210 520c-46-18-84-22-116-12-20 6-34 16-42 28l22 28c12-14 28-22 50-26 24-4 52 0 86 12z" fill="#f2c7a8"/>
    <!-- cuffs -->
    <path d="M176 540h92v34h-92z" fill="#0b2f6f" opacity="0.85"/>
    <path d="M360 540h100v34H360z" fill="#0b2f6f" opacity="0.85"/>
  </g>

  <!-- small floating icons -->
  <g opacity="0.9">
    <g transform="translate(120 170)" filter="url(#shadow)">
      <rect width="110" height="82" rx="18" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.12"/>
      <circle cx="48" cy="38" r="18" fill="none" stroke="#cfe0ff" stroke-width="4" opacity="0.9"/>
      <path d="M62 52l18 18" stroke="#cfe0ff" stroke-width="5" stroke-linecap="round"/>
    </g>
    <g transform="translate(990 160)" filter="url(#shadow)">
      <rect width="120" height="82" rx="18" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.12"/>
      <path d="M34 44l10 10 22-28" fill="none" stroke="#24c172" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M34 26h54" stroke="#cfe0ff" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
      <path d="M34 62h64" stroke="#cfe0ff" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
    </g>
  </g>
</svg>
